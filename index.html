<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReKo Protokoll</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>ReKo Protokoll</h1>
      <p>Name eingeben und loslegen</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Vor- und Nachname" autocomplete="name" required>
        <button type="submit" class="btn-login">Einschalten</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Wenn schon eingeloggt, direkt weiter
    if (Auth.getUser()) {
      window.location.href = 'protocol.html';
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('username').value.trim();
      if (!name) return;
      Auth.setUser({ id: null, name: name });
      window.location.href = 'protocol.html';
    });
  </script>
</body>
</html>
