<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReKo Protokoll</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>ReKo Protokoll</h1>
    <div class="header-actions">
      <span id="current-user" style="color:var(--mb-gray-300);font-size:13px;margin-right:4px"></span>
      <button onclick="window.location.href='admin.html'">Verwaltung</button>
      <button onclick="Auth.logout()">Wechseln</button>
    </div>
  </div>

  <!-- KW Tabs -->
  <div class="kw-tabs-bar">
    <div id="kw-tabs" class="kw-tabs"></div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading" style="display:none">
    <div class="spinner"></div>
    <p>Protokoll wird geladen...</p>
  </div>

  <!-- Main Content -->
  <div id="app-content" class="main" style="display:none">
    <!-- Lesebestaetigungen -->
    <div id="confirmations-section" class="confirmations-section" style="display:none">
      <h2>Offene Lesebestaetigungen</h2>
      <div id="confirmations-list"></div>
    </div>

    <!-- Wocheninfo -->
    <div class="week-info">
      <span id="week-dates"></span>
      <button id="btn-close-week" class="btn btn-primary btn-sm" onclick="confirmCloseWeek()">Woche abschliessen</button>
    </div>

    <!-- Anwesenheit -->
    <div class="attendance-section">
      <h2>Anwesenheit</h2>
      <div id="attendance-grid" class="attendance-grid"></div>
    </div>

    <!-- Eintraege -->
    <div id="entries-container"></div>
  </div>

  <!-- Save Indicator -->
  <div id="save-indicator" class="save-indicator"></div>

  <!-- Close Week Confirmation Modal -->
  <div id="close-week-modal" class="modal-overlay">
    <div class="modal">
      <h2 id="close-week-title">Woche abschliessen?</h2>
      <p id="close-week-desc">Das Protokoll wird als PDF heruntergeladen und anschliessend die Woche abgeschlossen. Bitte die PDF im lokalen Teams-Ordner speichern.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-primary" id="close-week-confirm-btn" onclick="doCloseWeek()">PDF erstellen &amp; abschliessen</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=9"></script>
  <script src="js/auth.js?v=9"></script>
  <script src="js/app.js?v=9"></script>
  <script>
    App.init();

    function confirmCloseWeek() {
      const kw = App.protocol ? App.protocol.calendar_week : '?';
      document.getElementById('close-week-title').textContent = `KW ${kw} abschliessen?`;
      document.getElementById('close-week-desc').textContent =
        `Das Protokoll fuer KW ${kw} wird als PDF heruntergeladen und anschliessend abgeschlossen. Bitte die PDF im lokalen Teams-Ordner speichern.`;
      document.getElementById('close-week-modal').classList.add('open');
    }
    function closeModal() {
      document.getElementById('close-week-modal').classList.remove('open');
    }
    async function doCloseWeek() {
      const btn = document.getElementById('close-week-confirm-btn');
      btn.textContent = 'PDF wird erstellt...';
      btn.disabled = true;
      try {
        await App.closeWeek();
      } catch (err) {
        console.error('Fehler beim Abschliessen:', err);
        alert('Fehler: ' + err.message);
        btn.textContent = 'PDF erstellen & abschliessen';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
