<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReKo Protokoll - Archiv</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>ReKo Protokoll</h1>
    <span class="kw-badge">Archiv</span>
    <div class="header-actions">
      <button onclick="window.location.href='protocol.html'">Aktuelles Protokoll</button>
      <button onclick="window.location.href='admin.html'">Verwaltung</button>
      <button onclick="Auth.logout()">Wechseln</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="archive-list" class="archive-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>Archiv wird geladen...</p>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="archive-modal" class="modal-overlay" onclick="if(event.target===this)Archive.closeModal()">
    <div class="modal" style="max-width:700px;max-height:80vh;overflow-y:auto">
      <div id="archive-modal-content"></div>
      <div class="modal-actions" style="margin-top:20px">
        <button class="btn btn-primary" id="btn-export-pdf">PDF exportieren</button>
        <button class="btn btn-secondary" onclick="Archive.closeModal()">Schliessen</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=5"></script>
  <script src="js/auth.js?v=5"></script>
  <script src="js/archive.js?v=5"></script>
  <script>
    Archive.init();
  </script>
</body>
</html>
